; NOTE: program uses extended interpolation, so mask your '$' character with double '$$'
[DEFAULT]
; here we post json like: { "date":"Mon Sep 28 12:45:55 2020", "timestamp":1601286355 }
updated_topic = updated

; the following are paths relative to device_topic:
; nagios-like status, e.g. from check_ide_smart for /dev/sdX
state_topic = state

# The tool to actually post our data to the mqtt
# see http://github.com/kadavris/mqtt-tool for a working solution
sender = /usr/local/bin/mqtt-tool --config=/etc/smarthome/mqtt/mqtt-tool.ini --stdin power-reports
; Override of default above for debugging:
; sender = ${DEFAULT:sender} -d --clientid power-reports reporters
; Or with a kitten:
; sender = /bin/cat

; if you want something other than default
; upsc_binary = /GNU/will/provide

; MQTT: Here is sample hierarchy that I use in my smarthome setup
;power
;     <dev_id> - json with other data goes here
;         ctl... - if you need some control
;         batt_charge - battery charge level
;         in_volts - input voltage
;         out_load - ups load in percent
;         state - OL, BOOST, etc...
;         type - device type (e.g. "ups")
;         updated - { "date":"human readable date", "timestamp":unix_timestamp, checks stats }

; root for all topics.
root_topic = hw/power

; device's root topic. $$device will be substituted by the currently examined device's name
device_topic = ${root_topic}/$$device

; NOTE: Replace all '.' with '_' in attributes names! Reported data will be processed in this way.

; attribute to sub-topic name map.
; Data associated with these attributes will be posted directly to the mapped topic.
; use space-separated attr:topic pairs
one_to_one = device_type:type
  battery_charge:batt_charge
  battery_runtime:batt_runtime
  battery_voltage:batt_voltage
  input_voltage:in_volts
  ups_alarm:ups_alarm
  ups_load:out_load
  ups_temperature:ups_temperature

; these attributes will be included into combined report to device_topic
; under the "attributes"{} json section.
; separate by space, multiline allowed.
; NOTE that device_mfr,  device_model,  device_type and  ups_status will be included always
bulk_report = battery_energysave
  battery_voltage_nominal
  battery_voltage_high
  battery_voltage_low
  input_frequency
  output_voltage
  output_frequency
  output_current
  output_current_nominal
  ups_power_nominal
  ups_power

; comment if you don't need to log raw samples into a big, big file
; This is the name of the log file
log_samples = /var/log/smarthome/ups-$$device.log
; Optional list of items that should be logged.
; If omitted, then all collected data will be posted. That still may be a subset of a full upsc report.
; Check one_to_one and bulk_report options for a list of approved attributes.
log_items = input_voltage
  voltage_mean_minute
  frequency_mean_minute
  battery_charge
  ups_status

; uncomment and supply a space-separated list if you don't want to rely on upsc -l output
; device names should match nut config
;devices = mybigups

; --------------------
; this section is about what and how frequent to report
; your country's standard voltage,tolerance percentage
standard_v = 230,10
; frequency,tolerance percentage
standard_freq = 50,4

; get actual reading every N seconds. Use -l or --loop switches to override
; loop disabled if value is <= 0
sample_interval = 30

; push data to MQTT sender every N seconds
report_interval = 60

; --- Permanent storage & stats ---
; permanent storage directory
perma_storage=/var/lib/smarthome/power

; You can add device-specific config parts with a new section with [power.DEVICE_ID] name:
[power.mybigups]
; If there is no vendor report for your model,
; use .attribute = value here to fake it
.mfr = OmsPower
.model = TRTL MVS 5000

; comma-separated batteries IDs. There should be a separate section for each, named [battery.ID]. See below.
; The default is 'main'
batteries=main

; power rating of this UPS. Provide an integer number followed by comma and optional unit name,
; which can be 'va' for V/A (default) or 'w' for Watts
; power_rating=<number>[,<unit>]

; how UPS reports load:
; p or % - as a percentage of nominal rating (default), v - for V/A, w - for Watts
; load_reported_as=p
; If device has a limited sensitivity at the low levels and reports zero below this load:
; default unit is watts
; load_zero=150w

; Invertor's quality of conversion. Default is 0.8. Your device might be better
; power_factor=0.8

; For devices that are miscalibrated or whatever,
; replace battery.charge and battery.runtime with calculated values
; calc_charge_data=no

; For a better charge speed calculations we want an exact device's charge current settings in Amps
; default is 10Amp
; charging_current=10

; other options that may override [power] section values:
; one_to_one
; bulk_report
; log_items

[battery.main]
; Battery specs section:
; Use 'batteries=<comma-separated list of IDs' in your device definition
; <type> is 'pb' (Lead-whatever). 'lifepo' may be added later
type=pb
; nominal voltage in Volts based on 12 * (pack's series count), 48 is 4s pack here
vnom=48
; nominal pack's capacity in A/h
capacity_ah=100

; Override it here
;calc_charge=no
